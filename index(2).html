<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Cadastro - Confeita Mais</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --brown-dark:   #3d2b1f;
            --brown-mid:    #6b4226;
            --brown-light:  #c49a6c;
            --gold:         #b8860b;
            --cream:        #fdfdfd;
            --bg-soft:      #f4eee8;
            --text-dark:    #2c1e15;
            --white:        #ffffff;
            --success:      #25d366;
            --ana-color:    #e91e63; /* Cor diferenciada para Ana */
            --lais-color:   #2196f3; /* Cor diferenciada para Lais */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-soft);
            background-image: radial-gradient(var(--brown-light) 0.5px, transparent 0.5px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            padding: 20px;
            color: var(--text-dark);
        }

        .card {
            width: 100%;
            max-width: 480px;
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            padding: 40px 20px 20px;
            text-align: center;
            background: var(--white);
        }

        .logo-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            background: var(--white);
            border-radius: 50%;
            padding: 5px;
            border: 2px solid var(--brown-light);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--brown-dark);
            font-weight: 700;
            margin-bottom: 5px;
        }

        .section-subtitle {
            font-size: 13px;
            color: var(--brown-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .content { padding: 0 40px 40px; }

        .form-group { margin-bottom: 15px; }

        .form-row {
            display: flex;
            gap: 10px;
        }
        .form-row .form-group { flex: 1; }
        .form-row .group-small { flex: 0 0 80px; }

        label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: var(--brown-mid);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            background-color: #fafafa;
            border: 1px solid #e2e2e2;
            border-radius: 8px;
            padding: 12px 15px;
            color: var(--text-dark);
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--brown-light);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(196, 154, 108, 0.1);
        }

        /* Estilo dos Botões de Atendente */
        .btn-whatsapp {
            width: 100%;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-ana { background-color: #25d366; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); }
        .btn-lais { background-color: #25d366; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); }
        .btn-whatsapp:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-validar {
            width: 100%;
            background-color: var(--brown-dark);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        .hidden { display: none; }

        .atendentes-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #eee;
            text-align: center;
        }

        .atendentes-container p {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--brown-mid);
        }

        .footer-tag {
            text-align: center;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--brown-light);
            font-size: 14px;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        @media (max-width: 480px) {
            .content { padding: 0 20px 30px; }
            .card { border-radius: 0; box-shadow: none; }
            body { padding: 0; background-image: none; background-color: white; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo-container">
            <img src="https://i.ibb.co/Q7YzkJz3/logo-confeita-mais.jpg" alt="Logo Confeita Mais" class="logo-img">
        </div>
        <h1 class="section-title">Bem-vinda(o)</h1>
        <p class="section-subtitle"> Vamos Finalizar seu Cadastro?</p>
    </div>

    <div class="content">
        <form id="cadastroForm">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Seu nome e sobrenome" required>
            </div>

            <div class="form-group">
                <label for="tipoDoc">Tipo de Documento</label>
                <select id="tipoDoc">
                    <option value="cpf">CPF (Pessoa Física)</option>
                    <option value="cnpj">CNPJ (Pessoa Jurídica)</option>
                </select>
            </div>

            <div class="form-group" id="group-cpf">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" inputmode="numeric">
            </div>

            <div class="form-group hidden" id="group-cnpj">
                <label for="cnpj">CNPJ</label>
                <input type="text" id="cnpj" placeholder="00.000.000/0000-00" maxlength="18" inputmode="numeric">
            </div>

            <div class="form-group">
                <label for="cidade">Cidade</label>
                <input type="text" id="cidade" placeholder="Sua cidade" required>
            </div>

             <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" placeholder="Ex: Manaira" required>
                </div>

            <div class="form-group">
                <label for="rua">Rua / Logradouro</label>
                <input type="text" id="rua" placeholder="Ex: Av. Principal" required>
            </div>

            <div class="form-row">
                <div class="form-group group-small">
                    <label for="numero">Nº</label>
                    <input type="text" id="numero" placeholder="123" required>
                </div>
            </div>

            <div class="form-group">
                <label for="whatsapp">SEU NÚMERO (com DDD)</label>
                <input type="text" id="whatsapp" placeholder="(00) 00000-0000" maxlength="15" inputmode="numeric" required>
            </div>

            <button type="button" id="btnValidar" class="btn-validar">Finalizar Cadastro</button>

            <div id="secaoWhatsApp" class="atendentes-container hidden">
                <p>Escolha uma atendente para enviar:</p>
                
                <button type="button" onclick="enviarPara('Ana')" class="btn-whatsapp btn-ana">
                    Envie seu cadastro para atendente Ana
                </button>

                <button type="button" onclick="enviarPara('Lais')" class="btn-whatsapp btn-lais">
                    Envie seu cadastro para atendente Lais
                </button>
            </div>
        </form>

        <div class="footer-tag">
            INGREDIENTES COM AMOR
        </div>
    </div>
</div>

<script>
    
    const NUMERO_ANA = "5583998884504"; 
    const NUMERO_LAIS = "5583991394485"; // 

    const tipoDoc = document.getElementById('tipoDoc');
    const groupCpf = document.getElementById('group-cpf');
    const groupCnpj = document.getElementById('group-cnpj');
    const inputCpf = document.getElementById('cpf');
    const inputCnpj = document.getElementById('cnpj');
    const secaoWhatsApp = document.getElementById('secaoWhatsApp');
    const btnValidar = document.getElementById('btnValidar');

    tipoDoc.addEventListener('change', () => {
        if (tipoDoc.value === 'cpf') {
            groupCpf.classList.remove('hidden');
            groupCnpj.classList.add('hidden');
            inputCnpj.value = '';
        } else {
            groupCpf.classList.add('hidden');
            groupCnpj.classList.remove('hidden');
            inputCpf.value = '';
        }
    });

    
    function validarCPF(cpf) {
        cpf = cpf.replace(/[^\d]+/g,'');
        if(cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
        let add = 0;
        for (let i=0; i < 9; i++) add += parseInt(cpf.charAt(i)) * (10 - i);
        let rev = 11 - (add % 11);
        if (rev == 10 || rev == 11) rev = 0;
        if (rev != parseInt(cpf.charAt(9))) return false;
        add = 0;
        for (let i = 0; i < 10; i ++) add += parseInt(cpf.charAt(i)) * (11 - i);
        rev = 11 - (add % 11);
        if (rev == 10 || rev == 11) rev = 0;
        return rev == parseInt(cpf.charAt(10));
    }

    function validarCNPJ(cnpj) {
        cnpj = cnpj.replace(/[^\d]+/g,'');
        if(cnpj.length !== 14 || /^(\d)\1{13}$/.test(cnpj)) return false;
        let tamanho = cnpj.length - 2;
        let numeros = cnpj.substring(0, tamanho);
        let digitos = cnpj.substring(tamanho);
        let soma = 0;
        let pos = tamanho - 7;
        for (let i = tamanho; i >= 1; i--) {
            soma += numeros.charAt(tamanho - i) * pos--;
            if (pos < 2) pos = 9;
        }
        let resultado = soma % 11 < 2 ? 0 : 11 - (soma % 11);
        if (resultado != digitos.charAt(0)) return false;
        tamanho = tamanho + 1;
        numeros = cnpj.substring(0, tamanho);
        soma = 0;
        pos = tamanho - 7;
        for (let i = tamanho; i >= 1; i--) {
            soma += numeros.charAt(tamanho - i) * pos--;
            if (pos < 2) pos = 9;
        }
        resultado = soma % 11 < 2 ? 0 : 11 - (soma % 11);
        return resultado == digitos.charAt(1);
    }

    // Máscaras de input
    inputCpf.addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d)/, '$1.$2');
        v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        e.target.value = v;
    });

    inputCnpj.addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = v.replace(/^(\d{2})(\d)/, '$1.$2');
        v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
        v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
        v = v.replace(/(\d{4})(\d)/, '$1-$2');
        e.target.value = v;
    });

    const waInput = document.getElementById('whatsapp');
    waInput.addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 11) v = v.slice(0, 11);
        if (v.length > 10) {
            v = v.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
        } else if (v.length > 6) {
            v = v.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
        } else if (v.length > 2) {
            v = v.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
        } else if (v.length > 0) {
            v = v.replace(/^(\d*)/, '($1');
        }
        e.target.value = v;
    });

   
    btnValidar.addEventListener('click', function() {
        const tipo = tipoDoc.value;
        const docValor = tipo === 'cpf' ? inputCpf.value : inputCnpj.value;
        const docRaw = docValor.replace(/\D/g, '');

        
        if(!document.getElementById('nome').value || !document.getElementById('cidade').value || !waInput.value) {
            alert('Por favor, preencha todos os campos obrigatórios.');
            return;
        }

        if (tipo === 'cpf') {
            if (!validarCPF(docRaw)) { alert('CPF inválido!'); return; }
        } else {
            if (!validarCNPJ(docRaw)) { alert('CNPJ inválido!'); return; }
        }

        if (waInput.value.replace(/\D/g, '').length < 11) {
            alert('WhatsApp inválido!'); return;
        }

        
        btnValidar.classList.add('hidden');
        secaoWhatsApp.classList.remove('hidden');
    });

    
    function enviarPara(atendente) {
        const tipo = tipoDoc.value;
        const docValor = tipo === 'cpf' ? inputCpf.value : inputCnpj.value;
        
        const dados = {
            nome: document.getElementById('nome').value.trim(),
            rua: document.getElementById('rua').value.trim(),
            num: document.getElementById('numero').value.trim(),
            bairro: document.getElementById('bairro').value.trim(),
            cidade: document.getElementById('cidade').value.trim(),
            wa: waInput.value
        };

        const textoMensagem = 
            `Olá, ${atendente}!\n\n` +
            `*Vim Finalizar meu Cadastro:*\n` +
            `• *Nome:* ${dados.nome}\n` +
            `• *${tipo.toUpperCase()}:* ${docValor}\n` +
            `• *Endereço:* ${dados.rua}, nº ${dados.num}\n` +
            `• *Bairro:* ${dados.bairro}\n` +
            `• *Cidade:* ${dados.cidade}\n` +
            `• *WhatsApp:* ${dados.wa}`;

        const numeroDestino = (atendente === 'Ana') ? NUMERO_ANA : NUMERO_LAIS;
        window.open(`https://wa.me/${numeroDestino}?text=${encodeURIComponent(textoMensagem)}`, '_blank');
    }
</script>

</body>
</html>
